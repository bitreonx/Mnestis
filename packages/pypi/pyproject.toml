[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mnestis"
version = "0.3.2"
description = "Mnestis — the memory layer for software. AI-ready codebase analysis."
readme = "README.md"
requires-python = ">=3.8"
license = "MIT"
authors = [{ name = "Mnestis" }]
keywords = ["code-analysis", "ai", "codebase", "developer-tools"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Topic :: Software Development",
]
dependencies = []

[project.urls]
Homepage = "https://mnestis.vercel.app"
Repository = "https://github.com/bitreonx/mnemos"
Issues = "https://github.com/bitreonx/mnemos/issues"

[project.scripts]
mnestis = "mnemos_cli:_run"

[tool.hatch.build.targets.wheel]
packages = ["src/mnemos_cli"]

[tool.hatch.build.targets.wheel.force-include]
"src/mnemos_cli/_bundled" = "mnemos_cli/_bundled"
